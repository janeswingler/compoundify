<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>compoundify</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]'], ['$$', '$$']]
      },
      startup: { typeset: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <script type="module" src="https://unpkg.com/mathlive"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.min.js"></script>
</head>
<body>

  <!-- ── Top bar ── -->
  <header class="topbar">
    <div class="topbar__brand">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M2 9l10-4 10 4-10 4-10-4z"/>
        <path d="M6 11v4c0 1.8 2.7 3 6 3s6-1.2 6-3v-4"/>
        <path d="M22 9v4"/>
      </svg>
      <span>compoundify</span>
    </div>
    <div class="topbar__topic" id="topbar-topic">No topic selected</div>
    <div class="topbar__actions">
      <span class="topbar__pid" id="topbar-pid"></span>
    </div>
  </header>

  <div class="app-shell">

    <!-- ══ LEFT PANEL: Progress Tracker ══ -->
    <aside class="progress-panel" id="progress-panel">
      <div class="panel-header">
        <h2>Learning Progress</h2>
        <div class="progress-summary" id="progress-summary">0 / 0 topics</div>
      </div>

      <!-- Overall progress bar -->
      <div class="overall-bar-wrap">
        <div class="overall-bar" id="overall-bar" style="width:0%"></div>
      </div>

      <!-- Topic list -->
      <div class="topic-list" id="topic-list">
        <p class="empty-hint">No topics yet.<br>Upload a document or add manually.</p>
      </div>
    </aside>

    <div class="col-resizer" id="resizer-left" title="Drag to resize"></div>

    <!-- ══ CENTRE PANEL: Chat ══ -->
    <main class="chat-panel">
      <div class="messages" id="messages" aria-live="polite"></div>

      <!-- Typing indicator -->
      <div class="typing-indicator" id="typing-indicator" style="display:none">
        <span></span><span></span><span></span>
      </div>

      <!-- Math panel (field + symbol shortcuts, one unified panel) -->
      <div class="math-panel" id="math-panel">
        <div class="math-panel__field-row">
          <math-field id="math-field" math-virtual-keyboard-policy="manual" style="flex:1; min-width:0;"></math-field>
          <button type="button" class="btn-calc" id="math-calc-btn" title="Evaluate expression">=&nbsp;Calculate</button>
          <button type="button" class="btn-ghost btn-sm" id="math-insert-btn">Insert ↑</button>
        </div>
        <div class="math-result" id="math-result" style="display:none">
          <span class="math-result__eq">=</span>
          <span class="math-result__value" id="math-result-value"></span>
          <button type="button" class="btn-ghost btn-sm" id="math-result-insert-btn" title="Insert result into message">Insert ↑</button>
        </div>
        <div class="math-symbols">
          <button class="sym-btn" data-latex="\frac{#0}{#0}" title="Fraction">a/b</button>
          <button class="sym-btn" data-latex="^{2}" title="Square">x²</button>
          <button class="sym-btn" data-latex="^{3}" title="Cube">x³</button>
          <button class="sym-btn" data-latex="^{#0}" title="Power">xⁿ</button>
          <button class="sym-btn" data-latex="\sqrt{#0}" title="Square root">√</button>
          <button class="sym-btn" data-latex="\sqrt[#0]{#0}" title="Nth root">ⁿ√</button>
          <button class="sym-btn" data-latex="\pi" title="Pi">π</button>
          <button class="sym-btn" data-latex="\pm" title="Plus-minus">±</button>
          <button class="sym-btn" data-latex="\times" title="Multiply">×</button>
          <button class="sym-btn" data-latex="\div" title="Divide">÷</button>
          <button class="sym-btn" data-latex="\approx" title="Approximately">≈</button>
          <button class="sym-btn" data-latex="e" title="Euler's number">e</button>
          <button class="sym-btn" data-latex="\ln" title="Natural log">ln</button>
          <button class="sym-btn" data-latex="\log" title="Log">log</button>
          <button class="sym-btn" data-latex="\infty" title="Infinity">∞</button>
          <button class="sym-btn" data-cmd="deleteBackward" title="Backspace">⌫</button>
        </div>
      </div>

      <!-- Input row -->
      <form class="input-row" onsubmit="return false;" id="input-form">
        <button type="button" class="btn-attach" id="upload-doc-btn" title="Attach a document (PDF or TXT)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="file" id="file-input" accept=".pdf,.txt" style="display:none" />
        <div class="input-body">
          <div id="math-chips" class="math-chips" style="display:none"></div>
          <label class="sr-only" for="user-input">Type a message</label>
          <textarea id="user-input" rows="1" placeholder="Ask a question or type your working…" autocomplete="off"></textarea>
        </div>
        <div class="input-actions">
          <button type="button" class="btn-ghost btn-minimise" id="math-toggle-btn" title="Minimise math panel">
            <svg id="math-toggle-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
          <button type="button" class="btn-quiz" id="quiz-btn" title="Take a check-in quiz on the current topic">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Quick Check
          </button>
          <button type="button" class="btn-quiz" id="practice-btn" title="Solve a practice problem on the current topic">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20"/></svg>
            Practice Problem
          </button>
          <button type="submit" class="btn-primary" id="send-btn">Send</button>
        </div>
      </form>
    </main>

    <div class="col-resizer" id="resizer-right" title="Drag to resize"></div>

    <!-- ══ RIGHT PANEL: My Notes ══ -->
    <aside class="notes-panel" id="notes-panel">
      <div class="panel-header">
        <h2>My Notes</h2>
        <button class="btn-ghost btn-sm" id="export-notes-btn" title="Export notes as text file">Export</button>
      </div>

      <div class="notes-list" id="notes-list">
        <p class="empty-hint">Highlight text in a chat message and click "Save", or create your own note.</p>
      </div>
    </aside>

  </div><!-- /.app-shell -->

  <!-- Add topic modal (simple inline) -->
  <div class="modal-overlay" id="add-topic-modal" style="display:none">
    <div class="modal">
      <h3>Add Topic</h3>
      <input type="text" id="new-topic-input" placeholder="Topic name" />
      <div class="modal-actions">
        <button class="btn-ghost" id="modal-cancel-btn">Cancel</button>
        <button class="btn-primary" id="modal-confirm-btn">Add</button>
      </div>
    </div>
  </div>

  <!-- Note composer window -->
  <div class="note-composer" id="note-composer" style="display:none" aria-hidden="true">
    <div class="note-composer__header" id="note-composer-header">
      <h3 id="note-composer-title">Create Note</h3>
      <div class="note-composer__controls">
        <button type="button" class="note-composer__btn" id="note-composer-min-btn" title="Minimise">_</button>
        <button type="button" class="note-composer__btn" id="note-composer-expand-btn" title="Expand">□</button>
        <button type="button" class="note-composer__btn" id="note-composer-close-btn" title="Close">×</button>
      </div>
    </div>

    <div class="note-composer__body" id="note-composer-body">
      <input type="text" id="note-composer-title-input" placeholder="Note title" />
      <textarea id="note-composer-content" rows="7" placeholder="Write your note..."></textarea>
      <label class="checkbox-label">
        <input type="checkbox" id="note-composer-is-formula"> Formula
      </label>
    </div>

    <div class="note-composer__footer" id="note-composer-footer">
      <button class="btn-ghost btn-sm" id="note-composer-cancel-btn">Cancel</button>
      <button class="btn-primary btn-sm" id="note-composer-save-btn">Save</button>
    </div>
  </div>

  <!-- Selection highlight tooltip -->
  <div class="sel-tooltip" id="sel-tooltip">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    Save highlight
  </div>

  <script src="app.js"></script>
</body>
</html>
